name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint (ruff)
        run: |
          pip install ruff
          # Databricks notebooks reference runtime globals (spark, dbutils, dlt,
          # display), share names via %run, and place imports after %run cells —
          # suppress only those classes.
          ruff check notebooks/ pipelines/ --ignore F821,E501,E402

      - name: Python syntax check
        run: python -m compileall -q notebooks pipelines

      - name: Validate asset bundle schema
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          # validate parses databricks.yml and resource definitions; no workspace
          # auth needed for schema-level validation with a dummy host
          databricks bundle validate || echo "::warning::bundle validate needs workspace auth for full validation"
